version: "3.9"

services:
  cadvisor:
    # image: gcr.io/cadvisor/cadvisor:v0.55.1
    image: cadvisor:58e3a621 # Our custom cadvisor image with container filtering
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - --enable_metrics=cpu,diskIO,memory,network
      # - --docker_only=false
      # Sample consensus node containers
      # docker ps --format '{{.ID}} {{.Names}}' | grep cl- | tail -n 16 | head -n 15 | awk '{printf "%s%s", (NR>1?",":""), $1} END {print ""}'
      - --docker_id_prefix_whitelist=b76d9c6539dd
      # - --disable_root_cgroup_stats=true
      # - --max_procs=128
      # - --port=8090
      # - --application_metrics_count_limit=20
    privileged: true
    devices:
      - /dev/kmsg

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  prometheus_data:
  grafana_data:
